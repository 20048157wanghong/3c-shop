<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#16a34a" flood-opacity="0.15"/>
    </filter>
    <filter id="emoji-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#16a34a" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bg-grad)"/>
  <rect width="400" height="400" rx="16" fill="url(#accent-grad)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="140" fill="url(#circle-grad)" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="100" fill="url(#circle-grad)"/>
  
  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="3" fill="#16a34a" opacity="0.1"/>
  <circle cx="320" cy="80" r="4" fill="#16a34a" opacity="0.08"/>
  <circle cx="80" cy="320" r="5" fill="#16a34a" opacity="0.06"/>
  <circle cx="320" cy="320" r="3" fill="#16a34a" opacity="0.1"/>
  <circle cx="200" cy="50" r="2" fill="#16a34a" opacity="0.08"/>
  <circle cx="200" cy="350" r="2" fill="#16a34a" opacity="0.08"/>
  
  <!-- Emoji -->
  <text x="200" y="225" text-anchor="middle" dominant-baseline="central" font-size="110" filter="url(#emoji-shadow)">🔋</text>
  
  <!-- Product ID watermark -->
  <text x="200" y="370" text-anchor="middle" font-family="monospace" font-size="11" fill="#16a34a" opacity="0.25">pb2</text>
</svg>